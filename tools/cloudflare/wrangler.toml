name = "orbit-demo-brain"
main = "worker.js"
compatibility_date = "2024-11-01"

# Plain (non-secret) vars. Secrets (GROQ_API_KEY, DEEPGRAM_API_KEY) are set with
# `wrangler secret put ...` or in the dashboard — never put keys in this file.
[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"
ALLOWED_ORIGIN = "*"   # set to "https://jonathan777-ui.github.io" to lock it down
