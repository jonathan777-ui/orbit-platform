name: Deploy site (demos + docs) to GitHub Pages

# Serves the gh-pages branch — all demo sites at the root, docs under /docs —
# via the GitHub Pages "Actions" source. Runs when this workflow changes or on a
# manual run (Actions -> this workflow -> Run workflow). Re-run after updating
# the gh-pages branch to refresh the live site.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages (demos + docs)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _site

      - name: Prepare artifact
        run: |
          rm -rf _site/.git
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
