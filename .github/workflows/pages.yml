name: Deploy docs site to GitHub Pages

# Builds the static docs site and publishes it to the `gh-pages` branch.
# Pages "Source" should be set to: Deploy from a branch -> gh-pages -> / (root).
# (The built site includes a .nojekyll file so GitHub serves the HTML as-is.)

on:
  push:
    branches: [main]
    paths:
      - "skills/airlock-vertical-kb/**"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install "markdown==3.10.2"

      - name: Build static site
        run: python site/build.py

      - name: Publish to gh-pages branch
        run: |
          cd site/_site
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy docs site ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
