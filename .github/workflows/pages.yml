name: Build & (gated) deploy docs site

# Human go-live gate: pushes only BUILD-CHECK (catch breakage). Publishing to the
# gh-pages branch happens only on a MANUAL run (workflow_dispatch) — that manual
# run IS the human go-live approval. Nothing reaches the live site automatically.
# (For a formal approval record, add a GitHub Environment with required reviewers
# to the `publish` job.)

on:
  push:
    branches: [main]
    paths:
      - "skills/airlock-vertical-kb/**"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-check:
    # Every push: build the site to catch breakage. Does NOT publish.
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install "markdown==3.10.2"
      - name: Build static site (validate)
        run: python site/build.py
      - name: Note
        run: echo "Build OK. Publish is GATED — run this workflow manually (Run workflow) to go live."

  publish:
    # Human go-live gate: only a manual run publishes to gh-pages.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install "markdown==3.10.2"
      - name: Build static site
        run: python site/build.py
      - name: Publish docs to gh-pages/docs (preserving demo sites)
        run: |
          # gh-pages also hosts the in-session-generated demo sites at the root.
          # Publish docs into the /docs/ subpath and PRESERVE everything else
          # (no force-push, no fresh git init) so demos are never clobbered.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages-out \
            || (mkdir gh-pages-out && cd gh-pages-out && git init -q -b gh-pages && cd ..)
          rm -rf gh-pages-out/docs
          mkdir -p gh-pages-out/docs
          cp -R site/_site/. gh-pages-out/docs/
          touch gh-pages-out/.nojekyll
          cd gh-pages-out
          git add -A
          git commit -q -m "Deploy docs site (/docs) ${GITHUB_SHA}" || { echo "No docs changes."; exit 0; }
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
