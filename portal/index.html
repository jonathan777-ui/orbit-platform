<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orbit — Revenue Infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Anton&family=Archivo:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Libre+Baskerville:wght@700&family=Jost:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d13;--panel:#10141d;--panel2:#141926;--bd:#1f2738;--ink:#e8edf6;--ink2:#9aa6bd;--faint:#5c6680;--amber:#ffb020;--cyan:#3dd6d0;--green:#5fd38d;--red:#ff6b6b;--violet:#9b8cff;--blue:#0a66ff;}
*{box-sizing:border-box}html,body{margin:0}
body{background:radial-gradient(1200px 620px at 82% -12%,#16203a 0,var(--bg) 55%);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;line-height:1.5}
a{color:inherit}
.bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(10,13,19,.92);backdrop-filter:blur(8px);z-index:30}
.logo{font-family:'Chakra Petch';font-weight:700;font-size:20px;letter-spacing:.04em;cursor:pointer}
.logo .o{color:var(--cyan)}
.doors{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;font-family:'IBM Plex Mono';font-size:12px}
.doors a{text-decoration:none;color:var(--ink2);border:1px solid var(--bd);padding:7px 12px;border-radius:8px;background:var(--panel)}
.doors a.on{border-color:var(--cyan);color:var(--cyan);background:rgba(61,214,208,.1)}
.wrap{max-width:1080px;margin:0 auto;padding:26px 18px 70px}
h1{font-family:'Chakra Petch';font-weight:700;font-size:clamp(26px,4.4vw,40px);margin:0 0 6px}
h1 .a{color:var(--cyan)}
.sub{color:var(--ink2);font-size:14.5px;max-width:760px;margin:0 0 22px}
.cardgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:720px){.cardgrid{grid-template-columns:1fr}}
.door{display:block;text-decoration:none;border:1px solid var(--bd);border-radius:16px;padding:24px;background:linear-gradient(180deg,var(--panel2),var(--panel));transition:.15s;cursor:pointer}
.door:hover{border-color:var(--cyan);transform:translateY(-2px)}
.door .ic{font-size:30px}
.door .t{font-family:'Chakra Petch';font-weight:700;font-size:21px;margin:10px 0 4px}
.door .d{color:var(--ink2);font-size:13.5px}
.door .go{font-family:'IBM Plex Mono';font-size:12px;color:var(--cyan);margin-top:12px}
.panel{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:16px}
.panel h2{font-family:'Chakra Petch';font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--cyan);margin:0 0 12px}
label{font-family:'IBM Plex Mono';font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);display:block;margin:10px 0 5px}
input,select{font-family:'IBM Plex Sans';font-size:14px;color:var(--ink);background:var(--panel);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--cyan)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.row{grid-template-columns:1fr}}
.btn{border:none;border-radius:10px;padding:12px 20px;font-weight:600;font-size:15px;cursor:pointer;background:var(--cyan);color:var(--bg);font-family:'IBM Plex Sans'}
.btn:disabled{opacity:.5;cursor:default}
.btn.alt{background:var(--violet);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--bd);color:var(--ink2)}
.tabs{display:flex;gap:6px;margin:4px 0 14px;flex-wrap:wrap}
.tabs button{font-family:'IBM Plex Mono';font-size:12.5px;color:var(--ink2);background:var(--panel);border:1px solid var(--bd);border-radius:9px;padding:9px 14px;cursor:pointer}
.tabs button.on{border-color:var(--cyan);color:var(--cyan);background:rgba(61,214,208,.1)}
/* device frame for generated client-facing surfaces (light "paper") */
.device{background:#fff;color:#0e1726;border-radius:16px;overflow:hidden;border:1px solid #d7deea;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.dchrome{display:flex;align-items:center;gap:6px;padding:9px 12px;background:#eef2f8;border-bottom:1px solid #d7deea}
.dot{width:10px;height:10px;border-radius:50%;background:#cfd7e3}
.durl{margin-left:8px;font-family:'IBM Plex Mono';font-size:11px;color:#7c899e;background:#fff;border:1px solid #e1e7f0;border-radius:6px;padding:3px 9px}
.langtog{margin-left:auto;font-family:'IBM Plex Mono';font-size:11px;display:flex;gap:4px}
.langtog button{border:1px solid #d7deea;background:#fff;border-radius:6px;padding:3px 8px;cursor:pointer;color:#51607a;font-family:inherit}
.langtog button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* generated site — premium */
.site{padding:0;font-family:var(--bodyf,'Archivo'),system-ui,sans-serif;color:#0f172a;background:#fff}
.site .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:#0b1220;color:#fff;gap:12px}
.site .topbar .bn{font-family:var(--disp,'Anton'),'Anton',sans-serif;text-transform:uppercase;letter-spacing:.5px;font-size:19px}
.site .topbar .bp{font-weight:800;font-size:14px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:7px}
.site .topbar .bp:before{content:"📞"}
.site .hero{position:relative;padding:56px 40px 46px;background:radial-gradient(120% 140% at 82% -10%,rgba(255,255,255,.07),transparent),var(--herograd,linear-gradient(160deg,#111827,#0b1220));color:#fff;overflow:hidden}
.site .hero:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.035) 0 2px,transparent 2px 24px);pointer-events:none}
.site .hero:after{content:"";position:absolute;right:-70px;top:-70px;width:260px;height:260px;background:var(--acc);filter:blur(95px);opacity:.4;border-radius:50%}
.site .eyebrow{position:relative;font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);display:flex;align-items:center;gap:9px}
.site .eyebrow:before{content:"";width:26px;height:2px;background:var(--acc)}
.site .hero h3{position:relative;font-family:var(--disp,'Anton'),'Anton',sans-serif;font-weight:400;letter-spacing:.5px;text-transform:uppercase;font-size:clamp(34px,6.4vw,58px);line-height:.95;margin:16px 0 14px}
.site .hero .sub{position:relative;font-size:16px;max-width:52ch;color:#cbd5e1;margin:0 0 24px;line-height:1.55}
.site .cta-row{position:relative;display:flex;gap:12px;flex-wrap:wrap}
.site .hbtn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#fff;font-weight:800;text-decoration:none;padding:14px 26px;border-radius:5px;font-size:15px;box-shadow:0 10px 26px -8px var(--acc);transition:transform .15s}
.site .hbtn:hover{transform:translateY(-2px)}
.site .hbtn.ghost{background:transparent;border:1.5px solid rgba(255,255,255,.32);box-shadow:none}
.site .badges{position:relative;display:flex;gap:18px;flex-wrap:wrap;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,.12)}
.site .badges span{font-size:12.5px;color:#e2e8f0;display:flex;align-items:center;gap:7px;font-weight:600}
.site .badges span:before{content:"✓";color:var(--acc);font-weight:800}
.site .statbar{display:grid;grid-template-columns:repeat(4,1fr);background:#0f172a;color:#fff}
.site .statbar .st{padding:22px 14px;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.site .statbar .st:last-child{border:none}
.site .statbar .num{font-family:var(--disp,'Anton'),'Anton',sans-serif;font-size:30px;color:var(--acc);line-height:1}
.site .statbar .lab{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#94a3b8;margin-top:6px}
@media(max-width:560px){.site .statbar{grid-template-columns:repeat(2,1fr)}.site .statbar .st:nth-child(2){border-right:none}}
.site .sec{padding:42px 40px;border-top:1px solid #eef2f8}
.site .sec .kick{font-weight:700;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc)}
.site .sec h4{font-family:var(--disp,'Anton'),'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.5px;font-size:26px;margin:8px 0 22px;color:#0f172a}
.site .svc{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:560px){.site .svc{grid-template-columns:1fr}}
.site .svc .s{border:1px solid #e6ebf3;border-radius:12px;padding:20px;background:#fff;position:relative;overflow:hidden;transition:box-shadow .15s,transform .15s}
.site .svc .s:hover{box-shadow:0 16px 32px -18px rgba(15,23,42,.45);transform:translateY(-3px)}
.site .svc .s:before{content:"";position:absolute;left:0;top:0;width:4px;height:100%;background:var(--acc)}
.site .svc .ic{width:42px;height:42px;border-radius:10px;background:color-mix(in srgb,var(--acc) 15%,#fff);display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px}
.site .svc .n{font-weight:800;font-size:16px}
.site .svc .x{font-size:13.5px;color:#51607a;margin-top:5px;line-height:1.5}
.site .why{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:560px){.site .why{grid-template-columns:1fr}}
.site .why .wn{font-weight:800;display:flex;align-items:center;gap:9px;font-size:15px}
.site .why .wn .e{font-size:20px}
.site .why .wx{font-size:13px;color:#51607a;margin-top:7px;line-height:1.55}
.site .band{padding:28px 40px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.site .band .bt{font-family:var(--disp,'Anton'),'Anton',sans-serif;text-transform:uppercase;font-size:23px;letter-spacing:.5px}
.site .band .bx{font-size:13px;opacity:.93;max-width:46ch}
.site .band a{background:#0b1220;color:#fff;font-weight:800;text-decoration:none;padding:13px 24px;border-radius:5px;white-space:nowrap}
.site .reviews{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:560px){.site .reviews{grid-template-columns:1fr}}
.site .rev{border:1px solid #e6ebf3;border-radius:12px;padding:18px;background:#fafcff}
.site .rev .stars{color:#f59e0b;font-size:14px;letter-spacing:2px}
.site .rev .q{font-size:13.5px;color:#0f172a;margin:9px 0;line-height:1.55}
.site .rev .who{font-size:12px;color:#64748b;font-weight:800}
.site .info{display:flex;gap:34px;flex-wrap:wrap;font-size:14px;color:#36435c}
.site .info b{display:block;font-weight:800;color:#0f172a;margin-bottom:4px;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase}
.site .closing{padding:48px 40px;background:var(--herograd,linear-gradient(160deg,#111827,#0b1220));color:#fff;text-align:center}
.site .closing h4{font-family:var(--disp,'Anton'),'Anton',sans-serif;text-transform:uppercase;font-size:30px;margin:0 0 10px;color:#fff}
.site .closing p{color:#cbd5e1;margin:0 auto 22px;max-width:46ch}
.site .samp{font-size:10px;color:#94a3b8;text-align:center;padding:7px;background:#f1f5f9;letter-spacing:.03em}
.site .sitefoot{padding:18px 40px;background:#0b1220;color:#64748b;font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;border-top:1px solid rgba(255,255,255,.06)}
/* chat surfaces */
.chat{display:flex;flex-direction:column;height:440px}
.chat .log{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#f7f9fc}
.msg{max-width:80%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.45}
.msg.bot{background:#fff;border:1px solid #e6ebf3;align-self:flex-start;border-bottom-left-radius:4px}
.msg.me{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.sys{align-self:center;background:#eef2f8;color:#51607a;font-family:'IBM Plex Mono';font-size:11px;border-radius:8px}
.chat .in{display:flex;gap:8px;padding:12px;border-top:1px solid #e6ebf3;background:#fff}
.chat .in input{flex:1;color:#0e1726;background:#fff;border:1px solid #d7deea}
.chat .in button{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:0 16px;font-weight:600;cursor:pointer}
.persona{display:flex;gap:14px;align-items:center;padding:16px;border-bottom:1px solid #e6ebf3;background:#fff}
.persona .av{width:46px;height:46px;border-radius:50%;background:var(--acc,#0a66ff);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch';font-weight:700;font-size:20px}
.persona .nm{font-family:'Chakra Petch';font-weight:700}
.persona .rl{font-size:12px;color:#7c899e}
.persona .spk{margin-left:auto;border:1px solid #d7deea;background:#fff;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:12px;color:#36435c}
.note{font-family:'IBM Plex Mono';font-size:11px;color:var(--faint);margin-top:10px;line-height:1.6}
.kbtag{font-family:'IBM Plex Mono';font-size:10px;color:var(--green);margin-top:2px}
/* lead desk widget */
.lead{border:1px solid var(--bd);border-radius:11px;padding:12px 14px;margin-bottom:9px;background:var(--panel)}
.lead .nm{font-family:'Chakra Petch';font-weight:700;font-size:15px}
.lead .meta{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink2);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.ind{font-family:'IBM Plex Mono';font-size:9.5px;text-transform:uppercase;color:var(--violet);background:rgba(155,140,255,.12);padding:2px 7px;border-radius:5px}
.lctrl{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:10px}
.lctrl select{width:auto;font-family:'IBM Plex Mono';font-size:12px;padding:6px 8px}
.lgen{background:var(--green);color:var(--bg);border:none;border-radius:8px;padding:7px 12px;font-weight:600;font-size:12px;cursor:pointer;font-family:'IBM Plex Sans'}
.lgen:disabled{background:var(--bd);color:var(--faint)}
.fill{border:1px solid var(--violet);background:rgba(155,140,255,.12);color:#cdc4ff;border-radius:8px;padding:6px 10px;font-size:11.5px;cursor:pointer;font-family:'IBM Plex Sans'}
.banner{background:rgba(255,176,32,.08);border:1px solid rgba(255,176,32,.3);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--ink2);margin-bottom:14px}
.banner b{color:var(--amber)}
.linkcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.linkcards{grid-template-columns:1fr}}
.lc{border:1px solid var(--bd);border-radius:12px;padding:14px;background:var(--panel);text-decoration:none;display:block}
.lc:hover{border-color:var(--cyan)}
.lc .t{font-family:'Chakra Petch';font-weight:700}
.lc .d{font-size:12.5px;color:var(--ink2);margin-top:3px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
footer{margin-top:26px;border-top:1px solid var(--bd);padding-top:13px;font-family:'IBM Plex Mono';font-size:11px;color:var(--faint);line-height:1.6}
.steps{display:grid;gap:8px}
.step{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink2)}
.step .n{width:22px;height:22px;border-radius:50%;background:rgba(61,214,208,.15);color:var(--cyan);display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch';font-weight:700;font-size:12px;flex-shrink:0}
.kbitem{border:1px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:8px;background:var(--panel)}
.kbitem .kt{font-family:'Chakra Petch';font-weight:700;font-size:14px}
.kbitem .kb{font-size:13px;color:var(--ink2);margin-top:3px}
.src{font-family:'IBM Plex Mono';font-size:10px;color:var(--faint);letter-spacing:.03em}
.guruchat{display:flex;flex-direction:column;height:300px;border:1px solid var(--bd);border-radius:11px;overflow:hidden;background:var(--bg)}
.guruchat .log{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.gmsg{max-width:88%;padding:9px 12px;border-radius:12px;font-size:13.5px;line-height:1.45}
.gmsg.me{align-self:flex-end;background:var(--cyan);color:var(--bg);border-bottom-right-radius:4px}
.gmsg.answer{align-self:flex-start;background:var(--panel2);border:1px solid var(--bd);border-bottom-left-radius:4px}
.gmsg.hold{align-self:flex-start;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.4);color:#ffc9c9}
.gmsg.review{align-self:flex-start;background:rgba(155,140,255,.12);border:1px solid rgba(155,140,255,.4);color:#d7cfff}
.gmsg.none{align-self:flex-start;background:rgba(255,176,32,.1);border:1px solid rgba(255,176,32,.3);color:#ffd98a}
.guruchat .in{display:flex;gap:8px;padding:10px;border-top:1px solid var(--bd)}
.guruchat .in input{flex:1}
.guruchat .in button{background:var(--violet);color:#fff;border:none;border-radius:9px;padding:0 16px;font-weight:600;cursor:pointer}
.helditem{font-size:12.5px;color:#ffc9c9;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:8px;padding:8px 10px;margin-top:6px;display:flex;justify-content:space-between;gap:8px;align-items:center}
.clrbtn{background:none;border:1px solid var(--bd);color:var(--ink2);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}
.hours-ed{display:grid;gap:7px;margin-top:6px}
.hrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px}
.hrow .hday{width:92px;font-weight:600;color:var(--ink)}
.hrow .hcl{display:flex;align-items:center;gap:5px;color:var(--ink2);font-size:12px;cursor:pointer}
.hrow .hcl input{width:auto}
.hrow .htimes{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hrow .h-break{display:inline-flex;align-items:center;gap:6px}
.hrow input[type=time]{padding:5px 7px;font-size:13px;border:1px solid var(--bd);border-radius:7px;background:var(--panel);color:var(--ink)}
.hrow .hdash{color:var(--faint)}
.hrow .h-addbreak{background:none;border:1px dashed var(--bd);color:var(--ink2);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer}
.hrow .h-addbreak:disabled{opacity:.35;cursor:default}
.site .hours-tbl{border-collapse:collapse;font-size:13px;margin-top:4px}
.site .topbar .blogo{height:22px;width:auto;max-width:120px;vertical-align:-6px;margin-right:9px;border-radius:5px;background:#fff;object-fit:contain}
.site .hours-tbl td{padding:3px 16px 3px 0;color:#36435c}
.site .hours-tbl td.hd{font-weight:800;color:#0f172a;text-transform:none;letter-spacing:0;font-size:13px}
/* per-vertical hero treatments */
.site[data-hero="elegant"] .hero h3,.site[data-hero="luxe"] .hero h3,.site[data-hero="editorial"] .hero h3{text-transform:none;letter-spacing:0;font-weight:700;line-height:1.04;font-size:clamp(38px,6.6vw,64px)}
.site[data-hero="fresh"] .hero h3{text-transform:none;letter-spacing:-.01em;font-weight:600}
.site[data-hero="elegant"] .sec h4,.site[data-hero="luxe"] .sec h4,.site[data-hero="editorial"] .sec h4,.site[data-hero="fresh"] .sec h4,.site[data-hero="elegant"] .closing h4,.site[data-hero="luxe"] .closing h4,.site[data-hero="editorial"] .closing h4,.site[data-hero="fresh"] .closing h4,.site[data-hero="luxe"] .band .bt,.site[data-hero="elegant"] .band .bt{text-transform:none;letter-spacing:0;font-weight:700}
.site[data-hero="luxe"] .hero,.site[data-hero="elegant"] .hero{text-align:center;padding-top:64px}
.site[data-hero="luxe"] .hero .sub,.site[data-hero="elegant"] .hero .sub{margin-left:auto;margin-right:auto}
.site[data-hero="luxe"] .cta-row,.site[data-hero="elegant"] .cta-row,.site[data-hero="luxe"] .badges,.site[data-hero="elegant"] .badges,.site[data-hero="luxe"] .eyebrow,.site[data-hero="elegant"] .eyebrow{justify-content:center}
.site[data-hero="luxe"] .hero:before,.site[data-hero="elegant"] .hero:before{background:radial-gradient(circle at 50% -10%,rgba(255,255,255,.07),transparent 62%)}
.site[data-hero="luxe"] .eyebrow:before,.site[data-hero="elegant"] .eyebrow:before{display:none}
.site[data-hero="luxe"] .hbtn,.site[data-hero="elegant"] .hbtn{border-radius:2px;letter-spacing:.04em;font-weight:700}

  /* ---------------- UNIFIED ANSWER ENGINE (powers chatbot + receptionist) ---------------- */
  function answer(text,p,v,lang){
    var t=(text||"").toLowerCase(), es=lang==="es";
    var name=p.name, phone=p.phone||"", hours=p.hours||(es?"horario comercial":"business hours"), city=p.city||"";
    function has(){for(var i=0;i<arguments.length;i++)if(t.indexOf(arguments[i])>=0)return true;return false;}

      return es?("Nuestro horario es "+hours+". ¿Quiere que le agende algo?"):("Our hours are "+hours+". Want me to get you scheduled?");
    if(has("where","location","address","direccion","dónde","ubica"))
      return es?("Estamos en "+(city||"su zona")+". ¿Le gustaría una cita?"):("We're located in "+(city||"your area")+". Would you like to book a visit?");
    if(has("price","cost","quote","estimate","precio","costo","cotiza","presupuesto"))
      return es?("Con gusto le doy un presupuesto gratis. ¿Me cuenta qué necesita?"):("Happy to get you a free estimate — tell me what you need and I'll set it up.");
    if(has("book","appointment","schedule","reserva","cita","agendar"))
      return es?("¡Perfecto! ¿Qué día le conviene? Puedo agendarlo ahora mismo."):("Great — what day works for you? I can book it right now.");
    if(v.emergency&&has("emergency","urgent","now","leak","flood","emergencia","urgente","gotera"))
      return es?("Esto suena urgente. Puedo conectarlo de inmediato"+(phone?(" al "+phone):"")+"."):("That sounds urgent — I can connect you right away"+(phone?(" at "+phone):"")+".");
    if(has("spanish","español","espanol","language","idioma","bilingual"))
      return es?("¡Claro! Le atiendo en español o inglés, lo que prefiera."):("Yes — I can help in English or Spanish, whatever you prefer.");
    if(has("human","person","agent","representante","persona","hablar con"))
      return es?("Puedo conectarlo con el equipo"+(phone?(" al "+phone):"")+". ¿Le ayudo con algo más mientras tanto?"):("I can connect you with the team"+(phone?(" at "+phone):"")+". Anything I can help with in the meantime?");
    if(has("service","offer","do you","servicio","ofrecen","hacen")){
      var list=v.services.map(function(s){return es?s[2]:s[0];}).join(", ");
      return es?("Ofrecemos: "+list+". ¿Cuál le interesa?"):("We offer: "+list+". Which one can I help you with?");
    }
    if(has("hi","hello","hey","hola","buenas"))
      return es?("¡Hola! Gracias por contactar a "+name+". ¿En qué le puedo ayudar?"):("Hi! Thanks for reaching out to "+name+". How can I help you today?");

      return es?("¡Con gusto! ¿Algo más en lo que pueda ayudar?"):("My pleasure! Anything else I can help with?");

  async function llmAnswer(text,p,v,lang,history){

      var r=await fetch(CHAT_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:sys,messages:(history||[]).concat([{role:"user",content:text}])})});
      var d=await r.json(); return d.text||d.reply||null;
    }catch(e){return null;}
  }

  var DAYS=[["mon","Monday","Lunes"],["tue","Tuesday","Martes"],["wed","Wednesday","Miércoles"],["thu","Thursday","Jueves"],["fri","Friday","Viernes"],["sat","Saturday","Sábado"],["sun","Sunday","Domingo"]];

  function collectHours(){
    var data={}, parts=[];
    document.querySelectorAll(".hrow").forEach(function(row){
      var day=row.getAttribute("data-day"), lab=DAYS.filter(function(d){return d[0]===day;})[0][1];

    return {data:data, text:parts.join("; ")};

    var issues=[],impact=[];

    if(p.vkey==="general"){issues.push("your specific industry");impact.push("the copy and AI answers stay broad instead of niche-accurate");}

    {t:"Cancellation & refunds",b:"First 30 days post-launch are 35% non-refundable (covers setup). After 30 days, an early-termination fee scales to the remaining term. No fee if the business closes or sells. Refunds are pro-rata on the unrendered term.",k:["cancel","termination","refund","early","quit"],aud:["customer","partner","support"]},
    {t:"Languages",b:"Every agent is bilingual — English and Spanish — across voice, chat, and website copy.",k:["spanish","language","bilingual","english"],aud:["customer","partner","support"]},
    {t:"Comp model for reps",b:"Q1 accelerator (months 1–3, ~35% total) trails to 20% (months 4–6) then 10% lifetime. Setter is guaranteed at target price; the closer funds discounts; the platform can override to win a strategic deal.",k:["commission","comp","payout","residual","setter","closer","bonus"],aud:["partner","support"]},
    {t:"Onboarding a new client",b:"1) Capture the profile, 2) generate & review the site/chatbot/receptionist, 3) confirm via the Deals Desk call, 4) attach live credentials, 5) go live.",k:["onboard","new client","setup","launch","kickoff"],aud:["partner","support"]},
    {t:"Tech stack (back-end)",b:"LLM: Claude tiered (Haiku/Sonnet/Opus by task). Telephony: Telnyx (Twilio interim). STT: Deepgram (prod) / browser Web Speech (demo). TTS: ElevenLabs Flash v2.5 (prod) / Qwen3-TTS (demo). CRM: Attio. Automation: n8n. Hosting: Netlify. DeepSeek is ruled out for any PII/customer-facing work.",k:["stack","architecture","backend","claude","telnyx","deepgram","elevenlabs","attio","n8n","tech"],aud:["support"]},
    {t:"Telnyx number cost & policy",b:"A Telnyx phone number (DID) is about $1/month plus roughly half a cent to a cent per minute. Assign one number per LIVE customer — the AI answers it (or forwards to their line). Orbit owns the number, which protects the client's privacy and is your leverage: stop forwarding and the service stops. The number is also your call-log, recording, and minute-billing source of truth.",k:["telnyx","number","did","phone cost","forward","price","dollar"],aud:["support"]},
    {t:"Live phone timeline (10DLC)",b:"Going live on phone/SMS needs a Telnyx number plus A2P 10DLC carrier registration — typically 1–7 business days. Previews and demos run offline immediately; the live line is the long pole.",k:["10dlc","carrier","live phone","a2p","registration","go live","sms"],aud:["support"]},
    {t:"Voice cloning",b:"ElevenLabs Instant Voice Cloning (IVC) needs ~1 min of audio and is near-instant — good for typical voices. Professional Voice Cloning (PVC) needs ~1–3 hrs of studio-quality audio and is best for unique accents; phone recordings are insufficient. Pair the clone with a low-latency model (Turbo/Flash) for real-time. Naturalness comes mostly from text register & pacing, not timbre.",k:["voice","clone","cloning","elevenlabs","ivc","pvc","tts"],aud:["support"]},
    {t:"Dedicated client email (cheap)",b:"Don't buy a Google Workspace mailbox per client (~$6–7/user/mo). Own ONE domain, then: (1) Cloudflare Email Routing — FREE — gives unlimited per-client forwarding addresses like dan@clients.orbit.ai that forward to their inbox and yours; (2) a transactional sender (Amazon SES ≈ $0.10 per 1,000 emails, or Resend/Postmark) to SEND from your authenticated domain (SPF/DKIM/DMARC) — no per-client mailbox needed; (3) Zoho Mail free tier only if a client needs a real login-able inbox. Net: every client gets a real address for ~$0 + pennies per send.",k:["email","mailbox","workspace","gmail","forwarding","cloudflare","ses","resend","zoho","cheap email","dedicated email"],aud:["support"]},
    {t:"Bot detection (free/cheap)",b:"Cloudflare free plan: Bot Fight Mode + managed WAF. Cloudflare Turnstile: free, unlimited, usually-invisible CAPTCHA — put it on every form, login, and the callback widget. Add honeypot fields + submit-timing traps + rate limiting. This stops ~all commodity bot abuse for $0.",k:["bot","captcha","turnstile","cloudflare","honeypot","rate limit","spam","security"],aud:["support"]},
    {t:"Authentication",b:"Use a free-tier provider (Supabase, Clerk, or Firebase Auth) — prefer passwordless magic links. A server function verifies the session token on every portal route; the catch-all login auto-routes by role. The in-hub Customer ID + PIN is DEMO-ONLY — client-side checks aren't real security. Proprietary logic must live server-side, sent only to an authenticated session.",k:["auth","login","magic link","supabase","clerk","firebase","session","pin","catch-all"],aud:["support"]},
    {t:"What to allow scraped (3 tiers)",b:"Tier 1 — public & indexable: home, service pages, vertical landing pages, lead-magnet TEASER pages; allow search + AI crawlers (that's the AIO play). Tier 2 — gated payload: the actual audit PDF / report behind an email + Turnstile. Tier 3 — proprietary: portals, KB internals, generator, scoring math, comp model → robots Disallow + noindex AND server-side auth. Robots.txt is politeness; auth is enforcement.",k:["scrape","scraping","robots","seo","aio","crawler","proprietary","index","tiers"],aud:["support"]},
    {t:"Consent & TCPA (back-end)",b:"Consent is per-channel (email / AI call / human call / SMS) and per-purpose — no pre-checked boxes. An AI/cloned voice on an outbound call is a 'robocall' → prior express written consent required. Honor revocation by any reasonable means ≤10 business days, across all channels. FTSA (Florida) is stricter — treat as the standard. 30-day re-permission; 'not interested' → 45–60 day quarantine. Marketing opt-out never blocks transactional messages.",k:["tcpa","consent","ftsa","can-spam","sms","opt-in","opt-out","revoke","compliance","robocall"],aud:["support"]},
    {t:"Deploying the hub",b:"Drag the UNZIPPED orbit-deploy FOLDER (all files) to Netlify manual deploy — NOT a single file or the zip, or tool pages 404. Optionally set an ANTHROPIC_API_KEY env var to enable the live LLM; without it the hub runs fully offline by design.",k:["deploy","netlify","zip","folder","404","env","api key","publish"],aud:["support"]},
    {t:"Offline vs live (what works now)",b:"Works now, offline: generation, site/chatbot/receptionist previews, the browser voice demo, all calculators. Needs a key: live LLM answers (ANTHROPIC_API_KEY). Needs Ace/provisioning: live phone (Telnyx+10DLC), SMS, cloned voice, CRM sync, server-side auth & consent storage.",k:["offline","live","demo","what works","limitations","preview"],aud:["support"]},
    {t:"Attio & n8n status",b:"Attio schema (creating attributes) must be done in the Attio UI or via REST — the connected tools are record-level, not attribute-creation. n8n workflows (Lead Lookup, Deals Ledger, re-permission, etc.) are built/validated but need credentials attached (Attio API key, sending credential) and activation before they run live.",k:["attio","n8n","workflow","schema","attribute","credential","crm","automation"],aud:["support"]},
    {t:"Quality issues to watch",b:"Visual fidelity must be checked in a REAL browser — jsdom/headless converters can't render CSS grid, color-mix, or web fonts, so a passing logic test isn't a visual sign-off. AI-inferred business data must be human-verified before it's customer-facing. Thin intake inputs produce generic output — the quality gate warns and the receptionist can't answer what it wasn't told.",k:["quality","visual","fidelity","render","verify","inferred","accuracy","jsdom"],aud:["support"]},
    {t:"Data & breach responsibility",b:"Ace owns customer data, hosting, and infrastructure, and bears data-breach liability. Keep all proprietary logic (scoring, prompts, KB, comp math) server-side and under NDA — exposing it in shipped HTML forfeits trade-secret protection.",k:["data","breach","liability","security","proprietary","nda","trade secret","responsibility"],aud:["support"]}

  function kbPool(aud){ return BASEKB.filter(function(e){return !aud||!e.aud||e.aud.indexOf(aud)>=0;}).concat(UPLOADED.filter(function(e){return !aud||!e.aud||e.aud.indexOf(aud)>=0;})); }
  function kbSearch(q,aud){ var pool=kbPool(aud); q=(q||"").toLowerCase().trim();

  function isChange(t){ return /\b(change|add|offer|remove|discount|waive|lower|raise|give|allow|enable|custom|promise|guarantee|free|show|display|skip|bypass|override)\b/i.test(t); }
  function policyConflict(t){ t=t.toLowerCase();
    if(/pric/.test(t) && /(public|website|web site|site|page|everyone|customer)/.test(t)) return POLICIES[0];
    if(/(legal|medical|financial)/.test(t) && /(advice|advis|diagnos|prescrib|recommend)/.test(t)) return POLICIES[1];
    if(/(take|move|pull|bring|steal)\s+(the\s+|my\s+|a\s+)?(customer|client|account)/.test(t) || /off[\s-]?platform/.test(t) || /poach/.test(t) || /solicit/.test(t)) return POLICIES[2];
    if(/(skip|bypass|without|no need for)\s+(human\s+)?(approval|sign[\s-]?off|review)/.test(t) || /auto[\s-]?deploy/.test(t) || /go live without/.test(t)) return POLICIES[3];
    if(/(skip|without|no)\s+verif/.test(t) || /auto[\s-]?publish/.test(t)) return POLICIES[4];
    if(/(minor|child|romantic|sexual|explicit)/.test(t)) return POLICIES[5];
    if(/(below|under|waive|ignore|no|remove)\s+(the\s+)?floor/.test(t) || /free deal/.test(t) || /sell.*for free/.test(t)) return POLICIES[6];
    for(var i=0;i<POLICIES.length;i++){ var p=POLICIES[i]; for(var j=0;j<p.k.length;j++){ if(t.indexOf(p.k[j])>=0) return p; } }
    return null;
  }

  function wireReview(){

  function dealPriority(sched,complexity,complete){
    var hoursOut=(new Date(sched)-Date.now())/3600000, delay="";
    var pr;
    if(!complete){ pr="delayed"; delay="Generic / missing info — add details to lift priority."; }
    else if(hoursOut>=24){ pr="high"; }
    else { pr="normal"; delay="Under 24h lead time — loaded best-effort, not pre-staged."; }
    var buildH=complexity==="Complex"?8:complexity==="Standard"?3:1;
    var readyBy=new Date(Math.max(Date.now()+buildH*3600000, (new Date(sched)).getTime()-2*3600000));
    return {priority:pr,delayReason:delay,readyBy:readyBy.toISOString(),preloaded:(pr==="high")};
  }

  function renderFulfillment(host){
    if(!host)return;
    var deals=LEADS.filter(function(l){return lstate[l.id].deal;}).map(function(l){return {l:l,s:lstate[l.id],d:lstate[l.id].deal};});
    if(!deals.length){ host.innerHTML='<div class="note" style="margin:0">No demos scheduled yet. Schedule one from the Lead Desk to load its Tool Chest here.</div>'; return; }
    var order={high:0,normal:1,delayed:2};
    deals.sort(function(a,b){ if(order[a.d.priority]!==order[b.d.priority])return order[a.d.priority]-order[b.d.priority]; return new Date(a.d.readyBy)-new Date(b.d.readyBy); });
    host.innerHTML=DEAL_STAGES.map(function(stg){
      var inStage=deals.filter(function(x){return x.d.stage===stg[0];});
      if(!inStage.length&&(stg[0]==="won"||stg[0]==="lost"))return "";
      var cards=inStage.map(function(x){
        var pr=x.d.priority, prTag=pr==="high"?'<span class="ind" style="color:var(--cyan);background:rgba(61,214,208,.12)">⚡ pre-loaded</span>':pr==="delayed"?'<span class="ind" style="color:var(--amber);background:rgba(255,176,32,.14)">⏳ delayed</span>':'<span class="ind">normal</span>';
        var done=x.d.chest.filter(function(c){return c.done;}).length;
        var chest=x.d.chest.map(function(c,ci){return '<label style="display:flex;gap:8px;align-items:center;padding:5px 0;font-size:13px"><input type="checkbox" data-chest="'+x.l.id+':'+ci+'" style="width:auto" '+(c.done?"checked":"")+'><span>'+escapeHtml(c.label)+(c.link?' <a href="'+c.link+'" '+(c.link.charAt(0)==="#"?"":'target="_blank"')+' class="src">open</a>':' <span class="src">'+(c.build?"build":"")+'</span>')+'</span></label>';}).join("");
        return '<div class="kbitem" data-deal="'+x.l.id+'"><div class="kt">'+escapeHtml(x.l.nm)+' '+prTag+' <span class="src">'+x.l.ind+'</span></div>'
          +'<div class="src">demo '+new Date(x.d.sched).toLocaleString()+' · '+x.d.complexity+' · site: '+(x.d.site==="widget"?"widget on existing":"generate new")+(x.d.delayReason?' · '+escapeHtml(x.d.delayReason):'')+'</div>'
          +'<div style="margin-top:8px"><div class="src">TOOL CHEST ('+done+'/'+x.d.chest.length+')</div>'+chest+'</div>'
          +'<div style="display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap"><select data-dealstage="'+x.l.id+'" style="width:auto"></select><button class="btn ghost" data-profile="'+x.l.id+'" style="padding:7px 12px">📋 Company Profile</button><a class="btn ghost" style="padding:7px 12px" target="_blank" href="'+gcalLink(x.l,x.d)+'">📆 Add to Google Calendar</a></div><div data-profilebox="'+x.l.id+'"></div></div>';
      }).join("")||'<div class="note" style="margin:0">—</div>';
      return '<div style="margin-bottom:12px"><div class="src" style="margin-bottom:6px">'+stg[1]+' ('+inStage.length+')</div>'+cards+'</div>';
    }).join("");
    host.querySelectorAll("[data-chest]").forEach(function(cb){cb.addEventListener("click",function(){var p=cb.getAttribute("data-chest").split(":");lstate[p[0]].deal.chest[+p[1]].done=cb.checked;persistPipeline();renderFulfillment(host);});});
    host.querySelectorAll("[data-dealstage]").forEach(function(sel){var id=sel.getAttribute("data-dealstage");DEAL_STAGES.forEach(function(c){var o=document.createElement("option");o.value=c[0];o.textContent=c[1];if(c[0]===lstate[id].deal.stage)o.selected=true;sel.appendChild(o);});sel.addEventListener("change",function(){lstate[id].deal.stage=this.value;if(this.value==="won")lstate[id].stage="Client";persistPipeline();renderFulfillment(host);});});
    host.querySelectorAll("[data-profile]").forEach(function(b){b.addEventListener("click",function(){var id=b.getAttribute("data-profile");var l=null;LEADS.forEach(function(x){if(x.id===id)l=x;});var pb=host.querySelector('[data-profilebox="'+id+'"]');if(!pb||!l)return;if(pb.getAttribute("data-open")==="1"){pb.innerHTML="";pb.removeAttribute("data-open");}else{pb.setAttribute("data-open","1");renderCompanyProfile(pb,l);}});});
  }
  function addPipelineLead(p){ // self-serve generate enters the pipeline as Hot
    var id="self_"+bizSlug(p.name); if(lstate[id])return;
    LEADS.unshift({id:id,nm:p.name,ind:V[p.vkey]?V[p.vkey].label:"General",vk:p.vkey,city:p.city||"",state:p.state||"",dom:(p.url||(bizSlug(p.name)+".com")).replace(/^https?:\/\//,"").replace(/\/.*$/,""),url:p.url||"",phone:p.phone||"",client:false});
    lstate[id]={stage:"Hot",off:"",rep:"Unassigned",reason:"",cooldownUntil:"",deal:null,source:"self-serve"};
    persistPipeline();
  }

  function generate(){
    if(!profile){ // no profile yet -> send to intake
      location.hash="#/new"; return;
    }
    app.innerHTML='<h1>Live <span class="a">Generation</span></h1><p class="sub">'+profile.name+' · '+V[profile.vkey].label+'. Fill any missing details, then it builds.</p>'
      +'<div class="panel"><h2>Profile</h2>'
      +'<div class="row"><div><label>Business name</label><input id="g_name"></div><div><label>Website URL</label><input id="g_url" placeholder="https://…"></div></div>'
      +'<div class="row"><div><label>Industry</label><select id="g_industry"></select></div><div><label>Phone</label><input id="g_phone"></div></div>'
      +'<div class="row"><div><label>City</label><input id="g_city"></div><div><label>State</label><input id="g_state"></div></div>'
      +'<label>Languages</label><select id="g_lang"><option value="en">English</option><option value="both">English + Spanish</option></select>'
      +hoursEditorHTML()
      +'<div style="margin-top:14px"><button class="btn" id="g_go">✨ Generate</button></div></div><div id="genResult"></div>';
    var sel=$("#g_industry"); Object.keys(V).forEach(function(k){var o=document.createElement("option");o.value=k;o.textContent=V[k].label;if(k===profile.vkey)o.selected=true;sel.appendChild(o);});
    $("#g_name").value=profile.name; $("#g_url").value=profile.url||""; $("#g_city").value=profile.city||""; $("#g_state").value=profile.state||"";
    $("#g_phone").value=profile.phone||""; $("#g_lang").value=(profile.lang||"both")==="both"?"both":"en";
    wireHoursEditor();
    $("#g_go").addEventListener("click",function(){
      var h=collectHours();
      profile={name:$("#g_name").value.trim()||"Your Business",url:$("#g_url").value.trim(),vkey:$("#g_industry").value,city:$("#g_city").value.trim(),state:$("#g_state").value.trim(),phone:$("#g_phone").value.trim(),hours:h.text,hoursData:h.data,lang:$("#g_lang").value,agent:"Riley"};
      runGenerate("#genResult","#/support");
    });
    // auto-run if profile already complete enough (came from lead with industry)
    runGenerate("#genResult","#/support");
  }

  /* ---------------- ROUTER ---------------- */
  var ROUTES={"":home,"new":newCustomer,"customer":customer,"partner":partner,"support":support,"generate":generate,"ops":ops,"resources":resourcehub};
  function route(){
    var h=(location.hash||"#/").replace(/^#\/?/,"");
    var fn=ROUTES[h]||home;
    document.querySelectorAll("#doors a").forEach(function(a){a.classList.toggle("on",a.getAttribute("data-door")===h);});
    fn();
    window.scrollTo(0,0);
  }
  document.getElementById("home").addEventListener("click",function(){location.hash="#/";});
  window.addEventListener("hashchange",route);
  route();
  window.__orbit={route:route,gen:function(p){profile=p;},answer:answer,vkey:vkey,leads:LEADS,lstate:lstate};
})();
</script>
</body></html>
