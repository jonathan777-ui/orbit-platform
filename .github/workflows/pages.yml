name: Build & (gated) deploy docs site

# Human go-live gate: pushes only BUILD-CHECK (catch breakage). Publishing to the
# gh-pages branch happens only on a MANUAL run (workflow_dispatch) — that manual
# run IS the human go-live approval. Nothing reaches the live site automatically.
# (For a formal approval record, add a GitHub Environment with required reviewers
# to the `publish` job.)

on:
  push:
    branches: [main]
    paths:
      - "skills/airlock-vertical-kb/**"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-check:
    # Every push: build the site to catch breakage. Does NOT publish.
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install "markdown==3.10.2"
      - name: Build static site (validate)
        run: python site/build.py
      - name: Note
        run: echo "Build OK. Publish is GATED — run this workflow manually (Run workflow) to go live."

  publish:
    # Human go-live gate: only a manual run publishes to gh-pages.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install "markdown==3.10.2"
      - name: Build static site
        run: python site/build.py
      - name: Publish to gh-pages branch
        run: |
          cd site/_site
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy docs site ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
